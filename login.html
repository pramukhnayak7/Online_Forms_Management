<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | ArchitectForm</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#dee0ff",
              "inverse-surface": "#2f3037",
              "surface": "#fbf8ff",
              "secondary-fixed-dim": "#71d7cd",
              "outline-variant": "#c5c5d4",
              "on-error-container": "#93000a",
              "inverse-on-surface": "#f2eff9",
              "surface-tint": "#4255b9",
              "on-tertiary-fixed-variant": "#723600",
              "on-secondary-container": "#006f67",
              "surface-bright": "#fbf8ff",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "surface-variant": "#e3e1ea",
              "inverse-primary": "#bac3ff",
              "tertiary": "#6c3300",
              "primary": "#23389c",
              "surface-container-low": "#f4f2fc",
              "secondary-fixed": "#8ef4e9",
              "on-secondary-fixed": "#00201d",
              "on-surface-variant": "#454652",
              "background": "#fbf8ff",
              "primary-fixed-dim": "#bac3ff",
              "secondary": "#006a63",
              "surface-container-lowest": "#ffffff",
              "tertiary-fixed-dim": "#ffb786",
              "secondary-container": "#8bf1e6",
              "primary-container": "#3e51b5",
              "on-primary-container": "#c9cfff",
              "tertiary-container": "#8f4600",
              "outline": "#757684",
              "on-surface": "#1a1b22",
              "on-background": "#1a1b22",
              "surface-container": "#efedf6",
              "tertiary-fixed": "#ffdcc6",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#311400",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#00504a",
              "surface-container-highest": "#e3e1ea",
              "surface-dim": "#dbd9e2",
              "on-primary-fixed-variant": "#283ca0",
              "on-primary": "#ffffff",
              "surface-container-high": "#e9e7f0",
              "on-tertiary-container": "#ffc6a1",
              "on-primary-fixed": "#00105b"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #23389c 0%, #3e51b5 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
<!-- Login Container -->
<main class="w-full max-w-[440px] z-10">
<!-- Header Branding -->
<div class="text-center mb-10">
<div class="inline-flex items-center gap-2 mb-6">
<div class="w-10 h-10 rounded-lg primary-gradient flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl" data-icon="architecture">architecture</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-on-surface">ArchitectForm</h1>
</div>
<h2 class="text-3xl font-bold text-on-surface tracking-tight mb-2">Welcome back</h2>
<p class="text-on-surface-variant body-lg">Please enter your details to sign in</p>
</div>
<!-- Main Card -->
<div class="bg-surface-container-lowest p-10 rounded-xl shadow-[0_24px_48px_-12px_rgba(26,27,34,0.04)] border border-outline-variant/15">
<!-- Form -->
<form action="#" class="space-y-6">
<!-- Email/Username Field -->
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email or Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3.5 bg-surface-container-high border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all text-on-surface placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low" id="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant font-medium" for="remember">Keep me signed in</label>
</div>
<!-- Submit Button -->
<button class="w-full primary-gradient text-on-primary font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Footer Links -->
<p class="mt-8 text-center text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:text-primary-container transition-colors ml-1" href="#">Create an account</a>
</p>
</main>
<!-- Bottom Decorative Content / Trust Indicators -->
<footer class="mt-12 text-center max-w-2xl px-6 opacity-60">
<div class="flex justify-center items-center gap-8 grayscale brightness-75">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Enterprise Grade</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm" data-icon="shield">shield</span>
<span class="text-[10px] font-bold uppercase tracking-widest">SSL Encrypted</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm" data-icon="gpp_good">gpp_good</span>
<span class="text-[10px] font-bold uppercase tracking-widest">ISO 27001</span>
</div>
</div>
</footer>
</body></html>
